<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page not found</title>
<script>
// Kith invite links arrive as /apps/kith/u/<id>#<verify>. GitHub Pages can't serve
// that dynamic path, so route it back to the Kith page (the #verify fragment rides
// along in the browser and is never sent to any server).
(function () {
  var m = location.pathname.match(/\/apps\/kith\/u\/([^\/?#]+)/);
  if (m) { location.replace('/apps/kith/?u=' + m[1] + location.hash); }
})();
</script>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; background: #0b0b12; color: #eee;
         display: grid; place-items: center; height: 100vh; margin: 0; text-align: center; }
  a { color: #EC4899; text-decoration: none; }
  h1 { font-weight: 800; }
</style>
</head>
<body>
  <div>
    <h1>Page not found</h1>
    <p><a href="/">Go home</a> · <a href="/apps/">Apps</a></p>
  </div>
</body>
</html>
