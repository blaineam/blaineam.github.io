name: Build & Deploy GitHub Pages

on:
  push:
    branches: [main]
    # Skip when the ONLY changed paths are the generated poster
    # assets — that commit comes from the bot-authored "chore(posters):
    # regenerate via CI" step below, and re-running on it causes
    # an infinite loop (JPEG encoding isn't bit-stable, so each
    # regen produces fresh bytes even for the same inputs).
    # `paths-ignore` only skips when EVERY changed path matches; a
    # human commit that touches source files + incidentally
    # re-runs the generator still triggers the workflow.
    paths-ignore:
      - 'apps/**/poster.jpg'
      - 'apps/apps-by-blaine-miller.jpg'
      - 'apps/.poster-cache.json'
  workflow_dispatch:

permissions:
  contents: write       # needed to commit regenerated posters back to main
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Persist-credentials so the regeneration commit below can push back.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          # `fetch-depth: 0` isn't needed — we only need HEAD for the
          # commit-back step.

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scripts/package-lock.json

      - name: Install poster-generator dependencies
        working-directory: scripts
        run: npm ci

      # Regenerates apps/apps-by-blaine-miller.jpg, every app's
      # apps/<slug>/assets/images/poster.jpg, and .poster-cache.json.
      # `--force` is intentional: we always re-run the hue-sampling
      # so commits from any contributor get a fresh poster baked
      # rather than relying on the fingerprint heuristic. If nothing
      # changed the output is byte-identical and the commit-back step
      # below is a no-op.
      - name: Regenerate app posters
        run: node scripts/generate-posters.js --force

      # Commit and push any regenerated poster files + cache update
      # back to `main`. This is the step the repo was missing —
      # previously posters only lived inside the Pages artifact, so:
      #   1. GitHub's legacy default `pages-build-deployment` workflow
      #      (the one that runs when Pages source = "Deploy from a
      #      branch") had nothing to deploy from the repo and thus
      #      clobbered the artifact.
      #   2. Direct-hotlinking to e.g.
      #      wemiller.com/apps/asteroic/assets/images/poster.jpg
      #      from a fresh checkout (or a meta og:image scraper that
      #      checks the repo directly) would 404.
      #
      # The Pages source is now `workflow` (not `legacy`), so the
      # default workflow is disabled and only THIS pipeline deploys.
      # Committing the posters back is still worth doing so the repo
      # is self-describing — you can clone it and see the generated
      # assets without needing to run the generator locally.
      - name: Commit regenerated posters
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/apps-by-blaine-miller.jpg \
                  apps/.poster-cache.json \
                  apps/*/assets/images/poster.jpg
          if git diff --cached --quiet; then
            echo "No poster changes to commit."
          else
            git commit -m "chore(posters): regenerate via CI [skip ci]"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # retention-days: 1 caps billed Actions storage — the default is 90
       # days, which caused unexpired `github-pages` artifacts (~420 MB each)
       # to stack up at 3.7 GB+ after a day of frequent redeploys. Only the
       # latest artifact is ever served by Pages; older ones are dead weight.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
